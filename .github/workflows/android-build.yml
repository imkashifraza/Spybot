name: Build Android APK with Base URL

on:
  push:
    branches: [main]
    paths: ['app/**']
  pull_request:
    branches: [main]
    paths: ['app/**']
  workflow_dispatch:
    inputs:
      build_type:
        description: 'APK build type'
        required: true
        default: 'release'
        type: choice
        options: ['debug', 'release', 'both']
      create_release:
        description: 'Create GitHub release?'
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']
      custom_version:
        description: 'Custom version tag'
        required: false
        default: ''
        type: string
      prerelease:
        description: 'Mark as pre-release?'
        required: true
        default: 'no'
        type: choice
        options: ['yes', 'no']
      custom_base_url:
        description: 'Optional base URL (http://domain.com or https://domain.com)'
        required: false
        default: ''
        type: string

permissions:
  contents: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BUILD_TYPE: ${{ github.event.inputs.build_type }}
      CREATE_RELEASE: ${{ github.event.inputs.create_release }}
      IS_PRERELEASE: ${{ github.event.inputs.prerelease }}
      CUSTOM_BASE_URL: ${{ github.event.inputs.custom_base_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine Version
        id: version
        run: |
          GRADLE_FILE=$(find ./app -path "*/app/build.gradle*" -not -path "*/.gradle/*" -not -path "*/build/*" -type f | head -n1)
          VERSION_NAME=$(grep "versionName" "$GRADLE_FILE" | sed 's/.*versionName[ =]*"\{0,1\}//;s/".*//')
          VERSION_CODE=$(grep "versionCode" "$GRADLE_FILE" | sed 's/.*versionCode[ =]*//')
          [ -n "${{ github.event.inputs.custom_version }}" ] && VERSION_NAME="${{ github.event.inputs.custom_version }}"
          [ -z "$VERSION_NAME" ] && VERSION_NAME="1.0.0-$(git rev-parse --short HEAD)"
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: Configure Base URL (if provided)
        if: ${{ env.CUSTOM_BASE_URL != '' }}
        run: |
          BASE="$CUSTOM_BASE_URL"
          BASE="${BASE%/}"
          SOCKET=$(echo "$BASE" | sed -E 's|^https?|ws|')/
          JSON="{\"host\":\"$BASE/\",\"socket\":\"$SOCKET\"}"
          DATA=$(echo -n "$JSON" | base64 -w0)
          FILE="./app/app/src/main/java/com/spybot/app/Utils/AppTools.kt"
          sed -i "s|private const val DEFAULT_DATA = \".*\"|private const val DEFAULT_DATA = \"$DATA\"|" "$FILE"
          echo "Injected Base URL into AppTools.kt: $BASE"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Build APK
        working-directory: ./app
        run: |
          chmod +x gradlew
          case "$BUILD_TYPE" in
            debug) ./gradlew assembleDebug ;;
            release) ./gradlew assembleRelease ;;
            both) ./gradlew assembleDebug assembleRelease ;;
          esac

      - name: Prepare APKs
        id: apk
        run: |
          VERSION="${{ steps.version.outputs.version_name }}"
          echo "debug_apk=" >> $GITHUB_OUTPUT
          echo "release_apk=" >> $GITHUB_OUTPUT

          if [ "$BUILD_TYPE" = "debug" ] || [ "$BUILD_TYPE" = "both" ]; then
            DEBUG_APK=$(find ./app -name "*debug*.apk" | head -n1)
            if [ -n "$DEBUG_APK" ]; then
              cp "$DEBUG_APK" "Spybot-v${VERSION}-debug.apk"
              echo "debug_apk=Spybot-v${VERSION}-debug.apk" >> $GITHUB_OUTPUT
            fi
          fi

          if [ "$BUILD_TYPE" = "release" ] || [ "$BUILD_TYPE" = "both" ]; then
            RELEASE_APK=$(find ./app -name "*release*.apk" | head -n1)
            if [ -n "$RELEASE_APK" ]; then
              cp "$RELEASE_APK" "Spybot-v${VERSION}-release.apk"
              echo "release_apk=Spybot-v${VERSION}-release.apk" >> $GITHUB_OUTPUT
            fi
          fi

      - uses: actions/upload-artifact@v4
        if: ${{ steps.apk.outputs.debug_apk != '' }}
        with:
          name: ${{ steps.apk.outputs.debug_apk }}
          path: ./${{ steps.apk.outputs.debug_apk }}
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: ${{ steps.apk.outputs.release_apk != '' }}
        with:
          name: ${{ steps.apk.outputs.release_apk }}
          path: ./${{ steps.apk.outputs.release_apk }}
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && env.CREATE_RELEASE == 'yes'))
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: Spybot v${{ steps.version.outputs.version_name }}
          files: |
            ${{ steps.apk.outputs.debug_apk }}
            ${{ steps.apk.outputs.release_apk }}
          prerelease: ${{ env.IS_PRERELEASE == 'yes' }}
          generate_release_notes: true
          body: |
            ## Spybot v${{ steps.version.outputs.version_name }}
            - Version Code: ${{ steps.version.outputs.version_code }}
            - Build Type: ${{ env.BUILD_TYPE }}
            - Base URL: ${{ env.CUSTOM_BASE_URL }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
