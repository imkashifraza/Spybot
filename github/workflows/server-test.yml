name: Server Test & Build

on:
  push:
    branches: [ main ]
    paths: [ 'server/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'server/**' ]
  workflow_dispatch:

jobs:
  server-test:
    runs-on: ubuntu-latest

    env:
      SERVER_PORT: 8999
      DOCKER_IMAGE: spybot-server-test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect Server Version
        id: version
        working-directory: ./server
        run: |
          if [ ! -f package.json ]; then
            echo "❌ package.json not found in server/"
            exit 1
          fi

          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Detected server version: $VERSION"

      - name: Install Dependencies
        working-directory: ./server
        run: |
          echo "📦 Installing npm dependencies..."
          npm install --silent
          echo "✅ Dependencies installed"

      - name: Syntax Check
        working-directory: ./server
        run: |
          echo "🔍 Checking server syntax..."
          node --check server.js
          echo "✅ Syntax check passed"

      - name: Start Server & Verify
        working-directory: ./server
        run: |
          echo "🚀 Starting server on port $SERVER_PORT..."
          nohup node server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          echo "⏳ Waiting for server to respond..."
          for i in {1..10}; do
            if curl -s http://localhost:$SERVER_PORT/ > /dev/null 2>&1; then
              echo "✅ Server responding on port $SERVER_PORT"
              curl -s http://localhost:$SERVER_PORT/
              exit 0
            fi
            echo "Waiting... ($i/10)"
            sleep 2
          done

          echo "❌ Server did not respond"
          cat /tmp/server.log
          exit 1

      - name: Docker Build
        working-directory: ./server
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "🐳 Building Docker image $DOCKER_IMAGE:$VERSION..."
          docker build -t $DOCKER_IMAGE:$VERSION .
          echo "✅ Docker image built: $DOCKER_IMAGE:$VERSION"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "## ✅ Server Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Syntax Check:** ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server Start:** ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Build:** ✅ Passed" >> $GITHUB_STEP_SUMMARY
          echo "- **Server Port:** $SERVER_PORT" >> $GITHUB_STEP_SUMMARY
